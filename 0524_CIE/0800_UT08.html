UT08 - Configuració d'instal·lacions fotovoltàiques
===================================================

## 1. Condicions de disseny: Catàlegs de fabricants

El procés de disseny d’una instal·lació solar fotovoltaica no pot desvincular-se de l’anàlisi detallada dels catàlegs dels fabricants. Aquests documents constitueixen la font principal d’informació tècnica i permeten garantir la compatibilitat entre els diferents equips.

Els catàlegs inclouen dades normalitzades segons condicions estàndard de prova (STC: $1000 , W/m^2$, $25^\circ C$, AM 1.5), però és important tenir en compte que les condicions reals d’operació difereixen significativament.



### 1.1 Interpretació de corbes característiques

Els mòduls fotovoltaics es descriuen mitjançant corbes I-V i P-V:

* **Corba I-V**: mostra la relació entre corrent i tensió.
* **Corba P-V**: permet identificar el punt de màxima potència (MPP).

Aquestes corbes varien amb:

* La irradiància
* La temperatura

Un augment de temperatura implica una reducció de la tensió i, per tant, de la potència disponible.



### 1.2 Compatibilitat entre equips

És imprescindible assegurar:

* Que la tensió del camp fotovoltaic es manté dins del rang admissible de l’inversor.
* Que el regulador suporta el corrent màxim generat.
* Que les bateries són compatibles amb el règim de càrrega.

Un mal dimensionament pot provocar:

* Pèrdues energètiques
* Activació de proteccions
* Reducció de la vida útil dels equips



## 2. Càlculs en instal·lacions fotovoltaiques

### 2.1 Nivells de radiació i unitats

La radiació solar incident és el paràmetre clau per determinar la producció energètica. A més de les unitats bàsiques, s’utilitza el concepte de:

* **Hores sol pic (HSP)**: nombre d’hores equivalents amb irradiància de $1000 , W/m^2$.

$$
E = P_{inst} \cdot HSP \cdot \eta_{global}
$$

Aquest valor simplifica el càlcul de producció diària o mensual.



### 2.2 Zones climàtiques i variabilitat

Les dades de radiació no són constants i presenten:

* Variacions estacionals
* Variacions interanuals

Per això es treballa amb valors mitjans i coeficients de seguretat.

A Espanya, la radiació és especialment favorable, amb valors elevats en zones com el sud peninsular i les Illes Balears.



### 2.3 Rendiment del sistema

El rendiment global es pot desglossar en:

$$
\eta_{global} = \eta_{mòduls} \cdot \eta_{inversor} \cdot \eta_{cables} \cdot \eta_{altres}
$$

On "altres" inclou:

* Pèrdues per temperatura
* Ombres parcials
* Degradació dels mòduls (aprox. 0,5% anual)



### 2.4 Orientació i inclinació: optimització energètica

L’angle d’inclinació ($\beta$) es pot ajustar segons l’objectiu:

* Producció anual màxima → $\beta \approx latitud$
* Optimització hivernal → $\beta = latitud + 10^\circ$
* Optimització estival → $\beta = latitud - 10^\circ$

També es pot considerar:

* Sistemes de seguiment solar (tracking)
* Instal·lacions fixes amb compromís anual



### 2.5 Estudi d’ombres

Les ombres poden produir:

* Pèrdues desproporcionades (efecte "coll d’ampolla")
* Aparició de punts calents (hot-spots)

Solucions:

* Disseny adequat de separacions
* Ús de diodes bypass
* Optimitzadors de potència



### 2.6 Càlcul detallat de pèrdues

Les pèrdues totals poden arribar al 20–25%. Es modelitzen mitjançant coeficients multiplicatius:

$$
E_{real} = E_{teòric} \cdot (1 - \sum pèrdues)
$$

És habitual utilitzar factors globals entre 0,75 i 0,85.



### 2.7 Dimensionament de bateries

A més de la fórmula bàsica, cal considerar:

* Temperatura de funcionament
* Règim de càrrega/descàrrega
* Tipus d’aplicació (aïllada o autoconsum amb backup)

Exemple:

$$
C = \frac{3000 \cdot 2}{24 \cdot 0,6 \cdot 0,9} \approx 463 , Ah
$$



### 2.8 Caiguda de tensió

Es recomana:

* Tram DC: &lt; 1,5%
* Tram AC: &lt; 3%

Una secció insuficient implica:

* Pèrdues energètiques
* Escalfament del conductor
* Risc de fallada



### 2.9 Connexió a terra i protecció

El sistema de posada a terra inclou:

* Preses de terra (piquetes, anells)
* Conductors de protecció
* Enllaços equipotencials

També és essencial la protecció contra:

* Sobretensions transitòries (llamps)
* Sobretensions permanents



### 2.10 Acumuladors: selecció avançada

Comparativa simplificada:

| Tipus     | Avantatges                   | Inconvenients                |
| - | - | - |
| Plom-àcid | Econòmic                     | Manteniment, baixa vida útil |
| AGM/GEL   | Sense manteniment            | Cost moderat                 |
| Liti      | Alta eficiència, llarga vida | Cost elevat                  |

Els sistemes moderns tendeixen cap al liti per la seva elevada densitat energètica i menor manteniment.



### 2.11 Sistemes de protecció

Els sistemes de protecció han de complir criteris de:

* Selectivitat
* Coordinació
* Rapidesa d’actuació

Inclouen també:

* Seccionadors DC
* Interruptors de tall en càrrega



### 2.12 Protecció del sistema acumulador

Especialment crític en bateries de liti:

* BMS (Battery Management System)
* Control de temperatura
* Equilibrat de cel·les



## 3. Característiques d’equips i càlcul de reguladors

### 3.1 Reguladors MPPT vs PWM

* **PWM**: funcionament simple, adequat per petits sistemes
* **MPPT**: maximitza la potència adaptant la tensió

El càlcul del corrent del regulador:

$$
I_{reg} \geq 1,25 \cdot I_{sc,total}
$$

També cal considerar:

* Sobredimensionament de seguretat
* Condicions extremes de radiació



### 3.2 Proteccions associades

* Fusibles calibrats
* Interruptors automàtics
* Protecció tèrmica

La correcta protecció evita:

* Danys per sobrecorrent
* Curtcircuits
* Sobreescalfaments



## 4. Processos administratius

### 4.1 Projecte tècnic

Inclou:

* Memòria descriptiva
* Càlculs justificatius
* Plànols
* Plec de condicions
* Pressupost

És obligatori en instal·lacions amb major complexitat o potència.



### 4.2 Memòria tècnica de disseny (MTD)

Document simplificat que inclou:

* Esquema unifilar
* Característiques dels equips
* Justificació normativa



### 4.3 Legalització de la instal·lació

Passos:

1. Execució
2. Certificat d’instal·lació
3. Inscripció en registre autonòmic
4. Contracte d’accés (si escau)



## 5. Marc normatiu i subvencions

### 5.1 Legislació aplicable

Inclou:

* Reglament Electrotècnic de Baixa Tensió (REBT)
* Normativa d’autoconsum
* Codis tècnics d’edificació



### 5.2 Subvencions i ajuts

Els programes d’ajut busquen:

* Fomentar energies renovables
* Reduir emissions
* Millorar l’eficiència energètica

Poden cobrir entre el 20% i el 60% de la inversió.



### 5.3 Procés de tramitació

Errors habituals:

* Documentació incompleta
* Incompliment de terminis
* No justificació correcta

És recomanable:

* Planificar amb antelació
* Consultar convocatòries vigents
* Utilitzar eines digitals de gestió



### 5.4 Normes internacionals

Les normes més rellevants són:

* IEC 61215 (mòduls fotovoltaics)
* IEC 61730 (seguretat)
* ISO 9001 (qualitat)

Aquestes asseguren:

* Fiabilitat dels equips
* Compatibilitat global
* Seguretat de les instal·lacions
