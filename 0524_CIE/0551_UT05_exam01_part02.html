Examen UT05 (part 02)
=====================

### Recorda capturar la pantalla amb [screencapture](https://screencapture.com)

**Percentatge 50%**

1. (_0,5 punts_) Descarrega el plànol en format dwg i importa'l al 
   Dialux. 
2. (_0,75 punts_) Fes el contorn i crea una habitació de 3,5 m d'altura
3. (_1 punt_) Descarrega't una luminaria similar al fluorescent de la 
   nostra aula i coloca 8 unitats individualment (una a una). 
   Si no la trobes utilitza qualsevol però es puntuarà (_0,5 punts_).
4. (_0,5 punts_) Afageix una taula. Canvia la textura i fes que sia de 
   fusta la seva part superior.
5. (_0,75 punts_) Afageix una pissarra que sia uniforme de color verd, 
   augmenta la reflectivitat fins al 80 %.
6. (_0,5 punts_) Afageix una finestra que ocupi mitja aula.
7. (_0,5 punts_) Simula i fes una captura de pantalla de les isolínies.
   Recorda adjuntar la captura al classroom.
8. (_0,5 punts_) Fes un raytracing de cara a una venta amb una 
   resolució de 1920x1080 pixels. Adjunta-la al classroom.
   
**Entrega** 
- l'editable del Dialux
- la imatge de les isolínies del pla de treball
- la imatge del raytracing
- l'screencapture
