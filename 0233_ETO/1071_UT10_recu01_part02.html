Recuperació UT10 - part 02
==========================

**Ponderació:** Aquesta part representa el **50 %** de la nota de l'examen

Utilitza un amplificador operacional que sumi: 
- una senyal triangular de 0.2 V de 1 kHz centrada a l'eix horitzontal 
(offset DC = 0),
- una senyal quadrada de 2 V i 100 Hz també centrada a l'eix horitzontal

Quan acabis, recorda enviar l'enllaç de TinkerCAD al classroom.

- **Alerta:** Recorda que la amplitud del TinkerCAD és entre màxim i 
mínim de l'ona. Per tant hauràs de demanar-li ones de 0,4 V i 4 V 
respectivament.
- **Alerta:** L'oscil·loscòpi que tens a la sortida ha de tenir un eix
horitzontal a on cada divisió sigui mig període si vols que es vegi bé.
