UT11.a - Circuits de temporització 
==================================


1. Caracterísitques
-------------------

Els circuits de temporització constitueixen dispositius electrònics destinats al control dels intervals d'activació o desactivació d'altres circuits o subsistemes. Aquests circuits tenen la capacitat de generar senyals de temporització precisos i reproduïbles. S'empren en nombroses aplicacions de l'àmbit industrial, especialment quan es requereix un temps de retard entre una acció i la següent. Existeixen diverses tipologies, des de les configuracions més elementals basades en xarxes RC fins a les més avançades, incloent-hi els sistemes que integren el circuit integrat 555, àmpliament utilitzat.

Tot i que els retards obtinguts mitjançant circuits RC presenten una precisió limitada, aquells basats en el circuit integrat 555 —el qual opera mitjançant la generació de trens de polsos a una freqüència controlada— ofereixen un comportament plenament fiables.

En termes generals, els circuits de temporització es fonamenten en una topologia coneguda com a multivibrador monoestable. Aquest tipus de multivibrador es caracteritza per presentar dos nivells o estats possibles a la sortida, dels quals només un és estable, mentre que l'altre és transitori o inestable. Els monoestables disposen d'una única entrada de control, mitjançant la qual, a partir d'un pols de curta durada, es produeix la commutació de l'estat estable a l'inestable. Transcorregut un interval de temps determinat, l'estat inestable finalitza i el circuit retorna a l'estat estable de manera autònoma, sense requerir cap senyal extern addicional.

Els circuits monoestables s'empren habitualment com a temporitzadors. Un circuit temporitzador genera, a partir d'un pols d'entrada, un senyal de sortida amb una durada predefinida.

Els temporitzadors tenen com a funció principal controlar el temps d'activació o desactivació de determinats circuits o dispositius. Es poden trobar aplicacions de temporitzadors en els àmbits següents:

- Processos industrials
- Sistemes de control automàtic: obertura de caixes de seguretat, regulació de regatge, etc.
- Equips electrònics de consum: forns de microones, forns convencionals, ventiladors, televisors, etc.
- Sistemes d'alarma

Un temporitzador pot implementar diferents modalitats de retard:

- Retard a la connexió
- Retard a la desconnexió
- Retard tant a l'activació com a la desactivació




2. Temporitzador amb retard a la connexió
-----------------------------------------

En el circuit representat al _vídeo 1_, l'objectiu és aconseguir que el LED s'il·lumini transcorregut un determinat retard respecte al moment d'accionament de l'interruptor. En l'estat inicial, es pot observar que el condensador C es troba carregat, el transistor T1 està en saturació, T2 es troba en tall i, en conseqüència, el LED roman apagat.

Quan s'acciona l'interruptor, el condensador C comença a descarregar-se a través de la resistència R. Passat un cert interval de temps, la tensió als borns del condensador arriba a zero, és a dir, el condensador s'ha descarregat completament. Aquest fet provoca que T1 commuti a l'estat de tall. En aquestes condicions, T2 queda connectat a la tensió d'alimentació VCC a través de la resistència corresponent, entrant en saturació i produint-se així la il·luminació del LED.

3. Temporitzador amb retard a la desconnexió
--------------------------------------------

En el circuit il·lustrat al _vídeo 2_, amb el polsador en la seva posició de repòs, el condensador es carrega a través de la resistència de 15 kΩ, la qual cosa provoca la saturació del transistor T1. Quan T1 es troba en estat de saturació, connecta la base de T2 directament a massa, forçant T2 a entrar en estat de tall; en conseqüència, el LED roman apagat.

En accionar el polsador, es crea un curtcircuit entre els borns del condensador C, descarregant-lo completament. Això fa que T1 passi a l'estat de tall. Simultàniament, T2 queda connectat a la tensió d'alimentació VCC a través de la resistència de 1 kΩ, entrant en saturació i provocant l'encesa del LED.

Quan el polsador retorna a la seva posició inicial, el condensador inicia un procés de càrrega progressiva. Transcorregut un cert temps, quan la tensió en el condensador assoleix el nivell suficient, T1 torna a saturar-se. En aquest moment, T2 commuta a l'estat de tall, i el LED s'apaga.

4. Temporitzadors amb NE555
---------------------------

Un temporitzador basat en el circuit integrat NE555, comunament denominat circuit 555 o IC 555, constitueix una solució àmpliament estesa per a la implementació de funcions de temporització en sistemes electrònics. El 555 és un circuit integrat d'alta estabilitat i gran precisió, capaç d'operar com a oscil·lador, temporitzador i oscil·lador controlat per tensió (VCO).

> ![c500](img/pins_estructura_555.png)
> **Fig. 1.** [Cerezo _et al._] (2024). [IOC].
> _Disposició dels pins i estructura interna del 555_. 
> Sota llicència [CC3.0-by-nc-sa]

A la figura es mostra, en primer terme, la disposició dels terminals del 555, presentat en un encapsulat de vuit pins. En segon lloc, se'n representa l'estructura interna, que comprèn dos amplificadors operacionals (AO) configurats com a comparadors i tres resistències de 5 kΩ connectades en sèrie, les quals generen les tensions de referència per a ambdós AO: l'entrada inversora de l'AO1 es fixa a 2/3 de VCC, mentre que l'entrada no inversora de l'AO2 es fixa a 1/3 de VCC. El circuit inclou així mateix un biestable RS, un transistor i una porta inversora (NOT).

### 4.1. Terminals

- **Terminals 1 (GND) i 8 (VCC):** Es connecten al pol negatiu i 
  positiu de la font d'alimentació (FA), respectivament. El dispositiu 
  admet una tensió d'alimentació compresa entre 4,5 V i 16 V.
- **Terminal 4 (RES):** Correspon a l'entrada de reset. Quan esconnecta 
  a massa, el circuit integrat cessa el seu funcionament. En les 
  aplicacions considerades, aquest terminal es connecta directament al 
  positiu de la font d'alimentació.
- **Terminal 3 (OUT):** És la sortida del dispositiu.
- **Terminal 2 (TRI, trigger):** Correspon a l'entrada inversora de 
  l'AO2. 
    + Quan la tensió aplicada en aquest terminal és inferior a 1/3 de 
      VCC, l'AO2 genera un nivell alt. 
    + Aquest nivell s'aplica a l'entrada S del biestable RS, provocant 
      que la seva sortida Q' commuti a nivell baix. 
    + En conseqüència, el transistor passa a l'estat de tall. En 
      aquesta situació, l'entrada de la porta inversora és 0, de manera 
      que la sortida (OUT) del 555 es troba a nivell alt (1).
- **Terminal 6 (THR, threshold):** Correspon a l'entrada no inversora 
  de l'AO1. 
    + Quan la tensió en aquest terminal supera 2/3 de VCC, l'AO1 
      subministra un nivell alt a l'entrada R del biestable RS, forçant 
      la sortida Q' a commutar a nivell alt. 
    + Això provoca que el transistor entri en estat de saturació. 
    + En aquest cas, l'entrada de la porta inversora és 1, de manera 
      que la sortida (OUT) del 555 es troba a nivell baix (0).

En l'estat inicial, la sortida del biestable RS es troba a nivell alt (1), la qual cosa implica que la sortida (OUT) del circuit integrat està a nivell baix (0). Simultàniament, el transistor intern es troba en estat de saturació. Atès que aquest transistor està connectat en paral·lel amb el condensador C, el condensador roman completament descarregat. Aquesta situació es manté estable fins que es produeix un impuls a l'entrada de disparament (TRI).

A la figura s'observa la forma d'ona de l'impuls generat pel polsador. Aquest impuls consisteix a dur l'entrada TRI a 0 volts durant un breu interval de temps, designat com a t₁.

Un cop generat aquest impuls, la sortida de l'amplificador operacional AO2 passa a nivell alt (1), la qual cosa eleva igualment a 1 l'entrada S del biestable RS. Com a conseqüència, la sortida Q' del biestable commuta a nivell baix (0); d'aquesta manera, la sortida OUT del 555 adquireix un nivell alt (1). El transistor intern commuta a l'estat de tall, permetent que el condensador C comenci a carregar-se a través de la resistència R.

Quan la tensió als borns del condensador C assoleix un valor igual a 2/3 de VCC, la sortida de l'amplificador operacional AO1 es posa a nivell alt (1). En aquest moment, l'entrada R del biestable RS rep un nivell alt, la qual cosa provoca el retorn a l'estat inicial: la sortida Q' del biestable torna a nivell alt, la sortida OUT del 555 torna a nivell baix (0), i el transistor intern torna a saturar-se, descarregant novament el condensador C.

### 4.3. Càlcul dels temps

L'interval de temps durant el qual la sortida OUT es manté a nivell alt (1) ve determinat per l'expressió següent:

\begin{gather}
  t = 1{,}1 \cdot C \cdot R
  \end{gather}

A on:
- t = temps de temporització (en s)
- C = capacitat del condensador (en F)
- R = resistència (en Ω)

> #### Exemple 1: Càlcul del temps de sortida
> 
> En un circuit temporitzador basat en el 555, es disposa d'una resistència R = 100 kΩ = 100 × 10³ Ω i un condensador C = 200 µF = 100 × 10⁻⁶ F. Es desitja calcular el temps durant el qual la sortida romandrà a nivell alt després de rebre un impuls a l'entrada TRI.

**Solució:**

Substituint els valors a la fórmula:

$$ t = 1{,}1 \cdot C \cdot R 
   = 1,1 \cdot (200 \cdot 10^{⁻6}) \cdot (100 \cdot 10^3) 
   = 22 ~ \text{s} $$

> #### Exemple 2: disseny per a una aplicació pràctica
>
> El president de la comunitat de veïns d'un edifici proposa implementar un circuit que controli la temporització de la il·luminació de l'escala. L'especificació requereix que, en accionar el polsador, els llums romanguin encesos durant aproximadament **cinc minuts**.
> 
> Es demana calcular els valors de R i C del circuit temporitzador realitzat amb el 555.

**Plantejament:**

El temps desitjat és:

$$ t = 5~\text{min} \rightarrow 5~\text{min} \cdot \frac {60 ~\text{s}}{1~\text{min}} = 300~\text{s} $$

Partint de la fórmula 1, es té:

$$ t = 1,1 \cdot C \cdot R \rightarrow 
   C \cdot R = \frac {t}{1{,}1} = \frac {300}{1{,}1} \approx
   272,73~\text{s} $$

**Criteri de disseny:**

Per a valors pràctics en electrònica, es recomana triar un condensador dins del rang típic per a aplicacions de temporització (per exemple, entre 10 µF i 1000 µF) i ajustar la resistència en conseqüència.

Per a una major estabilitat i menor sensibilitat a corrents de fuga, es recomana utilitzar condensadors un poc més grans i resistències moderades, ja que resistències excessivament elevades (per sobre d'1 MΩ) poden introduir errors.

Prenent C = 470 µF:

$$ C \cdot R = 272{,}73 \rightarrow R = \frac {272{,}73} {470 × 10⁻6} 
   \approx 580{,}276~\Omega $$

R ≈ 580 kΩ (valor comercial pròxim: 560 kΩ)

**Comprovació:**

$$ t = 1{,}1 \cdot C \cdot R 
   = 1,1 \cdot (470 \cdot 10^{⁻6}) \cdot (560 \cdot 10^3) 
   = 289{,}5 ~ \text{s} \approx 4 ~ \text{min } 49 ~ \text{s}  $$

UT11.b - Circuits oscil·ladors
==============================

1. Característiques
-------------------

Els oscil·ladors constitueixen circuits electrònics dissenyats per a la generació de senyals periòdiques, tals com ones sinusoidals, ones quadrades o ones triangulars, a una freqüència determinada. Aquests circuits troben una àmplia aplicació en l'àmbit de l'electrònica per a la generació de senyals de rellotge, senyals de temporització, senyals de referència o senyals destinades a sistemes de comunicació. El seu funcionament es basa en l'aplicació de realimentació positiva, mitjançant la qual una part del senyal de sortida es retorna a l'entrada del circuit amb la fase i l'amplitud adequades per a sostindre l'oscil·lació de manera contínua. Aquesta realimentació positiva permet compensar les pèrdues intrínseques del circuit i mantenir l'energia en el sistema, possibilitant així la generació del senyal periòdic requerit.

Existeixen oscil·ladors de naturalesa molt diversa, capaços de generar diferents formes d'ona en funció de la seva topologia, la qual pot estar basada en els següents elements:

- Transistors
- Amplificadors operacionals
- Circuit integrat 555
- Cristalls de quars



2. Oscil·lador RC
-----------------

L'oscil·lador de desplaçament de fase (en anglès _phase-shift oscillator_) és un circuit electrònic que produeix una sortida en forma d'ona sinusoïdal. Consisteix en un element amplificador inversor, com ara un transistor o un amplificador operacional, al qual s'afegeix una realimentació constituïda per una secció RC de tercer ordre en escala. Aquesta xarxa de realimentació introdueix un desfasament de 180° a la freqüència d'oscil·lació per proporcionar realimentació positiva. L'oscil·lador de desplaçament de fase s'utilitza freqüentment com a oscil·lador d'àudio.

Segons l'estructura clàssica d'un oscil·lador RC (per exemple, el basat en una xarxa de desfasament RC amb tres seccions), la **freqüència d'oscil·lació** ve donada per la fórmula següent:

\begin{gather}
f = \frac{1}{2 \pi \sqrt{6} \, R C}
\end{gather}

A on:
- \( f \) és la freqüència d'oscil·lació en hertz (Hz),
- \( R \) és el valor de la resistència en ohms (Ω),
- \( C \) és el valor del condensador en farads (F).

> #### Exemple:
> 
> Es demana calcular la freqüència d’un oscil·lador RC amb els següents valors:

- $ C = 22 \, \mu\text{F} = 22 \cdot 10^{-6} \, \text{F} $
- $ R = 1,5 \, \text{k}\Omega = 1,5 \cdot 10^{3} \, \Omega $

$$ f = \frac{1}{2 \pi \sqrt{6} \, R C} 
   = \frac{1}{2 \pi \sqrt{6} \cdot (1,5 \cdot 10^{3}) \cdot (22 
   \cdot 10^{-6})}
   = 1{,}97 \text{Hz}$$
   


3. Oscil·ladors LC
------------------

Segons  [Cerezo _et al._]:

> En aquests oscil·ladors, la xarxa de realimentació està formada per bobines i condensadors.
> 
> ![fl](img/oscilador_LC_ideal.png)
> En la figura, suposeu que el condensador ha estat prèviament carregat amb una tensió contínua. En connectar la bobina als extrems del condensador (a i b), el condensador trasllada la seva energia a la bobina —aquesta energia és emmagatzemada per ser alliberada després— per carregar un altre cop el condensador, i així successivament. Si no hi hagués pèrdues, entre a i b es generaria una ona sinusoidals perfecta.

La **freqüència d'oscil·lació** d'un oscil·lador **LC ideal** (sense pèrdues) ve donada per la fórmula següent:

\begin{gather}
f = \frac{1}{2 \pi \sqrt{L C}}
\end{gather}

on:
- \( f \) és la freqüència d'oscil·lació en hertz (Hz),
- \( L \) és la inductància de la bobina en henrys (H),
- \( C \) és la capacitat del condensador en farads (F).

Aquesta expressió es deriva de la **freqüència de ressonància** del circuit LC, on l'energia oscil·la entre el camp elèctric del condensador i el camp magnètic de la bobina.

En la majoria d’oscil·ladors LC la xarxa de realimentació està constituïda per tres impedàncies. Si en la figura hi ha dues bobines i  un condensador, estarem parlant d’un oscil·lador Hartley i si hi ha són dos condensadors i una bobina estarem parlant d’un oscil·lador Colpitts.

4. Multivibrador astable
------------------------

Un circuit astable és un tipus d'oscil·lador electrònic que no té cap estat estable. Això significa que la seva sortida està canviant contínuament entre dos nivells de tensió (normalment ALT i BAIX) de manera periòdica, sense necessitat d'un senyal extern per activar el canvi.

- Segons el circuit representat a la figura, en l'estat inicial el condensador C es troba completament descarregat, de manera que la tensió als seus borns és inferior a 1/3 de VCC. 
- En aquesta condició, l'entrada de disparament (TR) de l'amplificador operacional AO2 provoca la commutació del biestable RS, el qual posa la sortida (OUT) a nivell alt (1). 
- Simultàniament, el transistor intern es troba en estat de tall, la qual cosa permet que el condensador C comenci el seu procés de càrrega a través de les resistències Ra i Rb.
- Quan la tensió als borns del condensador supera el llindar de 2/3 de VCC, l'entrada de llindar (THR) de l'amplificador operacional AO1 fa commutar novament el biestable RS, i la sortida OUT passa a nivell baix (0). 
- En aquesta situació, el transistor intern, que fins aleshores es trobava en tall, passa a l'estat de saturació, establint un curtcircuit entre el terminal 7 (descarrega, DIS) i massa. 
- Aquesta connexió provoca que el condensador C es descarregui exclusivament a través de la resistència Rb.
- Quan la tensió al condensador cau per sota del llindar d'1/3 de VCC, el biestable RS commuta novament: la sortida OUT retorna a nivell alt (1), el transistor passa a l'estat de tall, i el condensador torna a carregar-se a través de Ra i Rb. 
- Aquest cicle es repeteix de manera contínua i autònoma, generant així una oscil·lació periòdica a la sortida.


**Temps de nivell alt (càrrega del condensador):**

\begin{gather} 
  T_1 = 0,693 \cdot (R_a + R_b) \cdot C
\end{gather}

**Temps de nivell baix (descàrrega del condensador):**

\begin{gather}
  T_2 = 0,693 \cdot R_b \cdot C 
\end{gather}

**Període total d'oscil·lació:**

\begin{gather}
  T = T_1 + T_2
\end{gather}

**Freqüència d'oscil·lació:**

\begin{gather}
  f = \dfrac{1}{T} 
\end{gather}

A on: 
- $R_a$ i $R_b$ són resistències externes,
- $C$ és el condensador de temporització,
- El factor 0,693 prové de $\ln(2) \approx 0,693$, relacionat amb els llindars de càrrega i descàrrega a 1/3 i 2/3 de VCC.


5. OScil·lador senoidal amb 555
-------------------------------

En aquest circuit, es mostrarà com es pot construir un generador d'ones sinusoidals mitjançant el circuit integrat 555.

Les ones sinusoidals són molt freqüents. Per exemple a la xarxa la freqüència és de 50 Hz i l'amplitud de 325 V $(\sqrt{2} \cdot 230)$.

Les ones sinusoidals també són presents en els generadors de funcions, els quals solen oferir senyals de sortida en forma sinusoidal, quadrada o triangular. A més, tenen un paper destacat en el camp de l'acústica.

En aquest circuit, s'utilitzarà un temporitzador 555 per generar un senyal sinusoidal aplicable a diverses finalitats.

En aquest circuit, el 555 es configurarà en mode astable. En aquest mode, la sortida commuta alternativament entre nivell alt (HIGH) i nivell baix (LOW) de manera cíclica.

- **Alimentació:** El circuit s'alimenta amb 4,5 V aplicats als terminals 8 (VCC) i 4 (RESET). El terminal 1 (GND) es connecta a massa.
- **Configuració astable:** En aquest mode, el 555 genera ones quadrades digitals que commuten entre HIGH i LOW.
- **Xarxa RC:** Està composta per una resistència de 100 kΩ i un condensador de 10 nF. Aplicant la fórmula de la freqüència per a un oscil·lador RC:

$$ f = \frac{1}{2 \pi R C} $$

s'obté una freqüència aproximada de 159 Hz:

$$ f = \frac{1}{2 \pi (100 \cdot 10^3) (10 \cdot 10^{-9})} \approx 
159 \, \text{Hz} $$

Així doncs, el senyal quadrat generat amb aquests valors té una freqüència d'aproximadament 159 Hz.

#### Conversió a ona sinusoidal

Per transformar aquest senyal quadrat en una ona sinusoidal, s'utilitza un circuit ressonant LC a la sortida del 555. Mitjançant un circuit LC ressonant connectat a la sortida del senyal quadrat, s'aconsegueix convertir-lo en un senyal de forma pràcticament sinusoidal.

Perquè aquesta conversió sigui efectiva, els valors dels components del circuit LC han de ser els adequats; en cas contrari, no es produirà el fenomen de ressonància. Una ona sinusoidal representa, des del punt de vista matemàtic, el model perfecte de la ressonància. Quan s'aconsegueix la ressonància mitjançant un circuit LC, el senyal de sortida esdevé sinusoidal.

#### Càlcul del circuit LC

Atès que la freqüència del senyal quadrat de sortida és aproximadament 7,2 kHz, cal dissenyar una xarxa LC que ressoni a aquesta freqüència per obtenir un senyal sinusoidal. La freqüència de ressonància d'un circuit LC ve donada per:

$$ f = \frac{1}{2 \pi \sqrt{L C}} $$

Amb una bobina de 1 H i un condensador d'1 μF, s'obté:

$$ f = \frac{1}{2 \pi \sqrt{1  \cdot (1 \cdot 10^{-6})}} \approx 159 \, \text{Hz} $$

Aquest valor és molt proper als 7,2 kHz del senyal quadrat, la qual cosa garanteix el funcionament del circuit. Com més properes siguin ambdues freqüències, més perfecta serà l'ona sinusoidal obtinguda.

#### Consideracions de precisió

El circuit requereix l'ús de valors precisos tant per a la xarxa LC com per a la tensió d'alimentació. Amb una alimentació de 4,5 V, el circuit ressona correctament. Desviacions significatives d'aquest valor poden impedir la ressonància. Es recomana mantenir la tensió propera a 4,5 V per a un funcionament òptim.

#### Modificacions possibles

La freqüència del senyal de sortida es pot modificant els valors de la xarxa RC. Incrementar els valors de R o C disminueix la freqüència; reduir-los l'augmenta.

Cal tenir en compte que en modificar la freqüència del senyal quadrat, també s'han d'ajustar els valors de la xarxa LC per mantenir la condició de ressonància a la nova freqüència.
