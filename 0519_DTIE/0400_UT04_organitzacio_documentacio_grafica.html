UT04 - Organització de la documentació gràfica
==============================================

1. Documents d'informació gràfica
---------------------------------

Constitueixen el nucli del projecte i defineixen geomètricament la solució adoptada. Es generen amb programari de disseny assistit per ordinador (CAD) i es basen majoritàriament en gràfics vectorials, la qual cosa garanteix la precisió i l'escalabilitat sense pèrdua de qualitat. Els formats clau són:
- ![fr100](img/ext_dwg.png)**DWG (_DraWinG_):** Format propietari i natiu d'AutoCAD. És l'estàndard de facto en la indústria per a l'intercanvi de plànols en fase de disseny i execució. La seva naturalesa propietària el fa dependent del programari d'Autodesk.
- **DXF (_Drawing eXchange Format_):** Format obert creat per Autodesk per facilitar la interoperabilitat entre diferents programes de CAD. ![fr100](img/ext_dxf.png) Tot i que pot representar la major part de la informació gràfica d'un DWG, és un format d'intercanvi, no de treball, i pot perdre metadades o funcionalitats avançades.
- **DGN (_DesiGN_):** Format natiu del programari MicroStation, molt estès en obra civil i cartografia.
- **Format d'intercanvi BIM (IFC):** Més que un plànol en 2D, és un format obert (ISO 16739) que conté un model 3D del projecte amb tota la seva informació (geometria, materials, fases) per a la col·laboració entre diferents disciplines.



### 1.1 Formats de paper normalitzats

La normalització dels formats de paper es regeix per la norma internacional ISO 216, basada en la sèrie DIN A. La seva característica principal és que cada format s'obté en dividir l'anterior per la meitat pel costat més llarg, mantenint una proporció constant d'1:√2.

El format de referència és el **DIN A0**, amb una superfície exacta d'1 m².

| Format     | Dimensions (mm) |
| :--------: | :-------------: |
| **DIN A0** | 841 × 1189      |
| **DIN A1** | 594 × 841       |
| **DIN A2** | 420 × 594       |
| **DIN A3** | 297 × 420       |
| **DIN A4** | 210 × 297       |
| **DIN A5** | 148 × 210       |

Per a plànols tècnics, és habitual l'ús de formats allargats per adaptar-se a les necessitats del dibuix sense malbaratar paper. Aquests formats s'obtenen multiplicant el costat curt d'un format base per un factor 2, 3, 4, etc. Per exemple, un A4 allargat (A4 x 3) mesura 210 × 891 mm. La seva nomenclatura és: **Format base x múltiple** (ex: DIN A2 x 4).



### 1.2 El doblegat de plànols

Els plànols de gran format (A0, A1, A2) s'han de doblegar per al seu arxiu i manipulació. L'objectiu és reduir-los a la mida d'un DIN A4 (210 × 297 mm) per guardar-los en carpetes, arxivadors o trametre'ls per correu, tot respectant dues regles fonamentals:

1.  **El caixetí de retolació ha de quedar visible a la part davantera,** una vegada doblegat. Això permet identificar el plànol sense obrir-lo.
2.  **L'última plegada serà una pestanya d'uns 20 mm que quedarà a la part posterior,** servint per a fixar el plànol a l'arxivador sense grapar ni perforar la zona de dibuix.

El procés de doblegat es realitza en dues fases: primer es fan plecs longitudinals en acordió i, posteriorment, es doblega en plecs transversals portant la base del plànol cap al caixetí, formant la pestanya final. Una execució neta i precisa és símptoma de professionalitat.

Es poden consultar les mides normatives a la [UNE102795](docs/norma_une_1027.pdf)





2. Arxius Digitals: Fonaments i Aplicacions
-------------------------------------------

### 2.1 Concepte d'arxiu: Contingut i estructura
Un arxiu digital és un conjunt de dades binàries emmagatzemades en un suport informàtic, que es tracta com una unitat lògica. Es distingeix del document físic per la seva immaterialitat i per la separació entre el contingut i el suport.

L'estructura d'un arxiu es compon de dos elements clau:
- **Contingut (les dades):** La informació útil, que pot ser text, imatge, àudio o una combinació.
- **Metadades:** Dades que descriuen el contingut, el context i l'estructura de l'arxiu. Inclouen informació com el nom de l'arxiu, l'autor, la data de creació, la mida, el tipus de format, etc. Són fonamentals per a la cerca, identificació i gestió documental.

L'**extensió** de l'arxiu (els caràcters després del punt, com `.docx` o `.pdf`) és una metadada crítica que indica al sistema operatiu quin programa ha d'obrir-lo.



### 2.2 Tipus de formats i la seva classificació

Un format d'arxiu és un estàndard que defineix com s'emmagatzema i organitza la informació dins d'un arxiu. Es classifiquen segons la naturalesa de la informació i el seu grau d'obertura.


#### Per tipus de contingut:
- **Textuals:** Contenen caràcters i, en formats enriquits, elements de format i imatges incrustades. Exemples: TXT, DOCX, ODT, PDF.
- **Numèrics i de càlcul:** Dissenyats per a l'organització tabular de dades i l'execució d'operacions matemàtiques, estadístiques i financeres. Exemples: XLSX, ODS.
- **Gràfics o d'imatge:** Emmagatzemen mapes de bits (JPEG, PNG, TIFF) o gràfics vectorials (SVG, DWG, DXF).
- **Bases de dades de pressupostos:** Formats estructurats per a la gestió de costos, amidaments i certificacions d'obra. Exemples: PZH, AQM, BC3.
- **Multimèdia:** Combinen àudio i/o vídeo en un sol contenidor. Exemples: MP4, AVI, MP3.


#### Per grau d'obertura i propietat:

- **Formats oberts:** La seva especificació és pública i no està subjecta a patents. Afavoreixen la interoperabilitat i la preservació digital. Exemples: PDF/A, ODF (Open Document Format), TXT, CSV.
- **Formats propietaris:** Són creats i controlats per una empresa, i la seva especificació pot ser secreta o canviar sense previ avís. Exemples: DWG (AutoCAD), PSD (Adobe Photoshop), DOC (antic Microsoft Word).



### 2.3 Processadors de text: Formats Word
El processador de textos és l'eina ofimàtica per excel·lència per a la creació de documents, els seus formats principals són:

![fr100](img/ext_odt.png)

- **DOC:** Format propietari binari utilitzat fins a la versió 2003. Tot i ser obsolet, encara és llegible per versions modernes.
- **DOCX:** Format estàndard des de la versió 2007. Es basa en l'estàndard obert Office Open XML. Essencialment, és un arxiu comprimit (ZIP) que conté diversos fitxers XML i recursos multimèdia. Això el fa més robust i menys propens a la corrupció que el seu predecessor.
- **RTF (_Rich Text Format_):** Format intercanviable entre diferents processadors de text, encara que amb limitacions en elements complexos.
- **ODT (_Open Document Text_):** L'alternativa oberta per excel·lència, utilitzat per suites com LibreOffice o OpenOffice i àmpliament recomanat per les administracions públiques per la seva neutralitat tecnològica.

### 2.4 Fulls de càlcul.

Imprescindibles per a la part quantitativa i econòmica del projecte. S'utilitzen per a càlculs estructurals simples, dimensionament d'elements, confecció d'amidaments i elaboració de pressupostos.

![fr100](img/ext_ods.png)

- **XLSX:** Format de Microsoft Excel. La seva potència rau en les eines d'anàlisi de dades i la programació de macros.
- **ODS (OpenDocument Spreadsheet):** L'alternativa oberta i estàndard, àmpliament utilitzada per a amidaments i pressupostos en entorns que prioritzen la interoperabilitat.

> ![c500](img/lo_calc.png)
> **Fig. 2.** J. Servera (2026).

### 2.5 Documents de text pla.

![fr100](img/ext_txt) Són arxius que contenen exclusivament caràcters de text sense cap mena de format (negretes, cursives, taules o imatges incrustades). La seva senzillesa els fa extremadament robustos i aptes per a la preservació digital i l'intercanvi de dades entre sistemes.

- **TXT:** L'extensió genèrica per a un fitxer de text pla. S'utilitza per a llegeix-me's (`README.txt`), notes de versions i, de vegades, com a format intermedi per a la importació o exportació de dades d'un programa tècnic (per exemple, llistes de punts d'una topografia).
- **DXF:** El DXF en realitat també es un fitxer de text pla.
- **Markdown i HTML**: Les extensions .md o .html (com la d'aquesta pàgina també són en text pla (prova de fer `Ctrl + U` mentre llegeixes això).

> ![c500](img/gedit.png)

### 2.6 Documents de bases de dades de pressupostos.

Són formats específics generats per programari de gestió de costos i pressupostos d'obra, com Arquímedes, Presto o TCQ. Aquests arxius no són simples fulls de càlcul, sinó bases de dades estructurades que vinculen els amidaments amb preus unitaris de bancs de dades oficials o de mercat.
- ![fr](img/ext_pzh.png)**PZH:** Format propietari del programari Presto. Emmagatzema l'estructura completa del pressupost: capítols, partides, amidaments, preus, certificacions i tota la informació necessària per a la gestió econòmica de l'obra.
- **BC3 (FIEBDC-3):** Format d'intercanvi estàndard de bases de dades de la construcció. Es tracta d'un fitxer de text pla amb una estructura de registres normalitzada (norma FIEBDC-3/2020) que permet la transferència d'informació entre diferents aplicacions de gestió de pressupostos i amidaments, garantint la interoperabilitat entre plataformes.
- ![fr100](img/ext_aqm.png)**AQM:** Format propietari del programari Arquímedes, pertanyent a l'ecosistema de CYPE Ingenieros. Aquest fitxer conté tota la informació del pressupost i, de manera nativa, està vinculat al Generador de Preus de CYPE, la qual cosa facilita la confecció i actualització constant dels preus unitaris a partir de bases de dades de referència del sector. El seu equivalent d'intercanvi és també el format BC3, que Arquímedes pot importar i exportar sense problemes.



### 2.7 El format de document portàtil: PDF
El PDF (_Portable Document Format_), creat per Adobe Systems, és un estàndard de facto per a la distribució i l'intercanvi de documents que han de mantenir la seva aparença original (disseny, tipografies, gràfics) independentment del programari, maquinari o sistema operatiu on es visualitzin.

La seva potència rau en les seves variants estandarditzades per ISO:
- **PDF d'arxiu (PDF/A):** Subconjunt del PDF dissenyat per a la preservació digital a llarg termini. Prohibeix elements que poden ser un obstacle per a la reproducció futura, com l'encriptació o el contingut multimèdia referenciat externament. És el format obligatori per a l'arxiu electrònic de documents.
- **PDF per a intercanvi d'impressió (PDF/X):** Subconjunt dissenyat específicament per a la indústria de les arts gràfiques per assegurar un intercanvi fiable d'arxius per a impressió professional. Assegura que totes les fonts i imatges estan incrustades.
- **PDF amb formulari:** Permet crear documents amb camps de text, caselles de verificació i botons que l'usuari pot emplenar electrònicament.






3. Codificació i Gestió Documental
----------------------------------

### 3.1 Normes de codificació documental
La codificació és el procés d'assignar un codi únic i estructurat a cada document per identificar-lo, localitzar-lo i gestionar-lo de manera inequívoca. Un bon sistema de codificació ha de ser:
- **Unívoc:** Un codi, un sol document.
- **Normalitzat:** Basat en un estàndard conegut per tota l'organització.
- **Significatiu:** El codi ha d'aportar informació sobre el document (projecte, tipus, revisió).
- **Escalable:** Ha de permetre el creixement sense esgotar les combinacions.

**Exemple d'estructura de codificació per a un projecte d'enginyeria:**
`AAA-BBB-CCC-DDD-EEE`

- `AAA`: Codi de projecte (ex: `P24` per al projecte de l'any 2024).
- `BBB`: Codi de disciplina (ex: `EST` per a estructures, `INS` per a instal·lacions).
- `CCC`: Tipus de document (ex: `PLN` per a plànol, `INF` per a informe, `PRE` per a pressupost).
- `DDD`: Número seqüencial dins del tipus (ex: `001`).
- `EEE`: Codi de revisió (ex: `RevA`, `Rev00`).

Per tant, un plànol d'estructures número 5 en revisió B d'un projecte pilot es codificaria com: `PIL-EST-PLN-005-RevB`. Aquesta estructura permet fer cerques ràpides filtrant per qualsevol dels blocs.



### 3.2 Tècniques de gestió de la documentació
La gestió documental és el conjunt de tècniques i operacions destinades a controlar de manera eficient la creació, recepció, distribució, arxiu i eliminació dels documents d'una organització.

- **Cicle de vida del document:** Tot document passa per tres fases:
    1.  **Fase activa:** Documentació d'ús freqüent per a les operacions diàries. L'accés ha de ser ràpid i directe.
    2.  **Fase semiactiva:** Consulta esporàdica, normalment per motius legals o fiscals. S'emmagatzema en arxius de gestió.
    3.  **Fase inactiva o històrica:** Documentació que ha de conservar-se de manera permanent pel seu valor legal, històric o cultural, o bé està pendent de la seva destrucció regulada (expurgació).

- **Control de versions i revisions:** És crític treballar sempre amb l'última versió. Un sistema de control ha de garantir:
    - Una numeració clara (v1, v2... o Rev.A, Rev.B...).
    - Un registre de canvis que detalli les modificacions introduïdes.
    - Un sistema d'aprovació que validi la nova versió i en retiri les obsoletes per evitar confusions. Un document obsolet no s'esborra, es marca com a tal i es retira a un arxiu històric.

- **Quadre de classificació:** És una eina jeràrquica i lògica que reflecteix les funcions i activitats de l'organització. Serveix com la "columna vertebral" de l'arxiu. Tots els documents es classifiquen en categories i subcategories, assegurant que la informació s'agrupa de manera coherent i no es perd.




4. Perifèrics de Sortida i Impressió Professional
-------------------------------------------------

### 4.1 Perifèrics de sortida gràfica

Els perifèrics de sortida gràfica són dispositius que permeten obtenir una còpia física i permanent de la informació digital. La seva elecció depèn de factors com la mida del suport, la velocitat, la qualitat i el tipus de tinta o tòner.

- **Impressores:** Dispositius per a formats petits i mitjans, generalment fins a DIN A3.
    - **Làser:** Utilitzen tòner en pols fixat al paper mitjançant calor (fusor). Ofereixen alta velocitat i una excel·lent qualitat de text.
    - **Injecció de tinta (Inkjet):** Projecten gotes microscòpiques de tinta líquida. Destaquen per la seva capacitat per a reproduir imatges fotogràfiques amb gran precisió de color sobre paper setinat.
    - **Tèrmiques:** Utilitzen paper termosensible que s'enfosqueix amb la calor. Molt comunes per a tiquets i etiquetes.



### 4.2 El traçador (plòter)

Un traçador, o plòter de grans dimensions, és una impressora especialitzada capaç de produir documents d'alta definició en formats de paper molt grans, des d'un A3 fins a un A0 i superiors. S'utilitzen en estudis d'arquitectura, enginyeria i disseny per a imprimir plànols, cartells i maquetes a escala real.

> ![c500](img/plotter.png)
> **Fig. 3.** [Lzur], [Wikipedia: Plotter Gerber Infinity], (2006).
> _Plotter_. 
> Sota llicència [CC3.0-by-sa]

**Característiques principals:**
- **Sistema d'alimentació del paper:** Poden ser de **rotlle** (permet imprimir llargàries contínues sense canviar el suport) o de **tall** (treballen amb fulls solts).
- **Tecnologia d'impressió:** La gran majoria de traçadors moderns són d'injecció de tinta, ja que permeten una excel·lent relació qualitat-preu i poden reproduir línies de gruix extremadament fi, essencials en el dibuix tècnic.
- **Característiques clau per al dibuix tècnic:** A més de la resolució (ppp), en un traçador és vital la **precisió de línia recta** (que un vector recte es dibuixi com una línia perfecta sense ondulacions) i la **capacitat de gestionar múltiples llenguatges** d'impressió (HP-GL/2, PostScript).

El capçal d'impressió d'un traçador recorre l'amplada del paper mentre aquest avança, construint la imatge línia per línia sobre l'àrea d'impressió.



### 4.3 Impressió professional: sistemes i acabats

La impressió professional va més enllà d'obtenir una còpia. Es tracta d'un procés industrial que busca la màxima qualitat i durabilitat, sovint en grans tirades.

- **Sistemes d'impressió digital professional:**
    - **Impressió de gran format (LFP):** És la tecnologia dels traçadors portada al nivell més alt, amb tintes resistents a l'aigua i als raigs UV.
    - **Impressió digital tòner d'alta producció:** Equips làser d'altíssim rendiment, amb capacitats de fins a centenars de pàgines per minut, pensades per a tirades curtes i mitjanes amb dades variables (ex: factures personalitzades).

- **Acabats de postimpressió:**
    Són els processos que transformen els fulls impresos en un producte final. Inclouen:
    1.  **Guillotinat:** Tall recte per donar el format definitiu a la pàgina.
    2.  **Plegat i doblegat:** Realitzat amb màquines plegadores de manera mecànica i precisa, especialment per a fulletons i plànols.
    3.  **Enquadernació:** Donar forma de llibre o dossier. Les tècniques més habituals són:
        - **Grapat:** Per a documents de poques pàgines.
        - **Espiral o canals de plàstic:** Permeten una obertura plana de 360°, ideal per a manuals d'ús.
        - **Enquadernació tèrmica:** Les pàgines es fixen en un llom mitjançant cola calenta. És l'estàndard dels llibres de butxaca de baix cost.
    4.  **Plastificat:** Aplicació d'una fina capa de plàstic (brillant o mat) per protegir i donar rigidesa al document, molt comú en portades, carnets i cartells d'exterior.
