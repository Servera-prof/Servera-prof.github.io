UT05 - Pressupostos en IE amb arquímedes.			
=========================================

Cada tasca val 1 punt excepte a on s'indiqui. La puntuació
de l'exercici serà la suma dels punts obtinguts dividit pel total
de punts multiplicat per deu 

> $$ \dfrac {\sum\limits_{i=1}^n P_i}{\sum\limits_{i=1}^n Z_i} \cdot 10 $$
> A on:
> - $ n $ és el total de tasques
> - $ P_i $ és la puntuació obtinguda a la tasca i-èssima
> - $ Z_i $ és la puntuació màxima de la tasca i-èssima



Examen 1
--------

Per a fer el següent exercici s'han de realitzar tots els punts
següents:

- (_0,5 punts_) Descarregat i obri l'arxiu de [l'enllaç](docs/examen.cyp)

- (_0 punts_) Obri el plànol del projecte que estas fent o el que vàres fer al primer trimestre

- Copia una partida de la base de preus d'Extremadura, que et serveixi de base per a endolls tipus C2a (tipo _schuko_).
  
- Tradueix la descripció i el titol (pots utilitzar el traductor de Softcatalà), revisa que no hi hagi errades a la traducció automàtica

- Crea materials auxiliars per valor de un 4% del cost de la partida.

- Fes els amidaments del saló i de un dormitòri, el línies d'amidament separades. Suposa que hi ha dos apartament exactament iguals.

- (_0,5 punts_) Imprimeix el descompost.
- (_0,5 punts_) Imprimeix el pressupost i amidaments.

- (_0,5 punts_) Guarda l'arxiu en format comprimit cyp.

**Entrega**

- pdf del descompost.
- pdf del pressupost i amidaments
- arxiu .cyp
- arxiu .dwg que has utilitzat per a fer els amidaments.
- captura de screencapture
